server:
  port: 8080

spring:
  application:
    name: online-exam-proctoring-system

  datasource:
    url: ${DB_URL:jdbc:h2:mem:oepsdb}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${JWT_SECRET:oeps-super-secret-key-for-jwt-signing-change-in-production-0123456789}
    expiration-ms: 86400000
